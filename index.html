<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>等高线原理 V9.0 - 三峰精细标注版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            padding: 15px; text-align: center; border-bottom: 1px solid rgba(0,255,255,0.2);
        }
        h1 { margin: 0; color: #00ffff; font-size: 22px; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,255,0.7); }
        .subtitle { color: #88ffff; font-size: 12px; opacity: 0.8; margin-top: 5px; letter-spacing: 1px; }

        #cam-box {
            position: absolute; bottom: 20px; left: 20px; width: 180px; height: 135px;
            border: 1px solid #00ffff; border-radius: 6px; background: #001111; overflow: hidden; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        #video-input { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.6; }
        #hand-tracker {
            position: absolute; width: 14px; height: 14px; border-radius: 50%;
            background: rgba(0,255,255,0.5); border: 2px solid #fff;
            transform: translate(-50%, -50%); display: none; z-index: 20;
            box-shadow: 0 0 10px #00ffff;
        }

        #data-panel {
            position: absolute; right: 20px; top: 90px; text-align: right; color: #fff;
            background: rgba(0,20,30,0.6); padding: 20px; border-radius: 10px; border: 1px solid rgba(0,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        .label { font-size: 11px; color: #88ffff; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 18px; font-weight: bold; font-family: monospace; color: #fff; text-shadow: 0 0 5px #00ffff; margin-bottom: 15px;}
        .highlight { color: #ffff00; }
        .legend-item { display: flex; align-items: center; justify-content: flex-end; gap: 8px; font-size: 12px; color: #aaa; margin-bottom: 5px;}
        .color-box { width: 10px; height: 2px; }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffff; font-family: monospace; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="loader">INITIALIZING TERRAIN SCAN...</div>
    <div id="ui-layer">
        <div id="top-bar">
            <h1>Topo-Scanner V9</h1>
            <div class="subtitle">三峰地貌 · 精细标注 · 全息交互</div>
        </div>
        <div id="cam-box">
            <video id="video-input"></video>
            <div id="hand-tracker"></div>
        </div>
        <div id="data-panel">
            <div class="label">VIEW MODE 视角模式</div>
            <div class="value highlight" id="mode-text">Searching...</div>
            <div class="label">ROTATION 旋转角</div>
            <div class="value" id="rot-text">0°</div>
            <div style="border-top: 1px solid rgba(0,255,255,0.2); padding-top: 15px;">
                <div class="legend-item">高海拔 (High) <div class="color-box" style="background:#ff5500"></div></div>
                <div class="legend-item">中海拔 (Mid) <div class="color-box" style="background:#ffaa00"></div></div>
                <div class="legend-item">低海拔 (Low) <div class="color-box" style="background:#00ffaa"></div></div>
            </div>
            <div style="margin-top: 20px; font-size: 11px; color: #88aabb; line-height: 1.8;">
                [GESTURE CONTROL]<br>
                ✋ PALM: 2D Map View<br>
                ✊ FIST: 3D Mountain View<br>
                ↔️ MOVE: Rotate Scene<br>
                ↕️ ZOOM: Scale Map
            </div>
        </div>
    </div>
    <div id="canvas-container"></div>

<script>
    // ================= 1. 数学库 (Perlin Noise for details) =================
    const ImprovedNoise=function(){var p=[151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];for(var i=0;i<256;i++)p[256+i]=p[i];function fade(t){return t*t*t*(t*(t*6-15)+10)}function lerp(t,a,b){return a+t*(b-a)}function grad(hash,x,y,z){var h=hash&15;var u=h<8?x:y,v=h<4?y:h==12||h==14?x:z;return((h&1)==0?u:-u)+((h&2)==0?v:-v)}return{noise:function(x,y,z){var X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);var u=fade(x),v=fade(y),w=fade(z);var A=p[X]+Y,AA=p[A]+Z,AB=p[A+1]+Z,B=p[X+1]+Y,BA=p[B]+Z,BB=p[B+1]+Z;return lerp(w,lerp(v,lerp(u,grad(p[AA],x,y,z),grad(p[BA],x-1,y,z)),lerp(u,grad(p[AB],x,y-1,z),grad(p[BB],x-1,y-1,z))),lerp(v,lerp(u,grad(p[AA+1],x,y,z-1),grad(p[BA+1],x-1,y,z-1)),lerp(u,grad(p[AB+1],x,y-1,z-1),grad(p[BB+1],x-1,y-1,z-1))))}}};
    const perlin = new ImprovedNoise();

    // ================= 配置 =================
    const CONFIG = {
        size: 120,          // 地形物理尺寸
        resolution: 256,    // 【关键】高分辨率网格，保证线条精细
        maxHeight: 50,      // 最高峰
        interval: 5.0,      // 等高线间隔 (5米一条)
        lerpSpeed: 0.12     // 手势跟随速度
    };

    // ================= Scene Setup =================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010103); // 深空黑
    scene.fog = new THREE.FogExp2(0x010103, 0.005); // 深度雾

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // 旋转组
    const terrainGroup = new THREE.Group();
    scene.add(terrainGroup);

    // ================= 2. 三峰地形生成 (Gaussian Sum) =================
    // 使用高斯函数叠加，精确控制三座山峰的位置和形态
    function getElevation(x, z) {
        let h = 0;
        // 主峰 (中心偏后) - 高而尖
        h += 45 * Math.exp(-((x*x + (z-15)*(z-15)) / 500));
        // 左侧峰 - 矮而胖
        h += 30 * Math.exp(-(((x+35)*(x+35) + (z+10)*(z+10)) / 800));
        // 右侧峰 - 中等
        h += 35 * Math.exp(-(((x-30)*(x-30) + (z+20)*(z+20)) / 600));
        
        // 添加微量噪声增加真实感
        h += perlin.noise(x * 0.15, z * 0.15, 0) * 2.5;
        return Math.max(0, h);
    }

    const geo = new THREE.PlaneGeometry(CONFIG.size, CONFIG.size, CONFIG.resolution, CONFIG.resolution);
    geo.rotateX(-Math.PI / 2);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        pos.setY(i, getElevation(pos.getX(i), pos.getZ(i)));
    }
    geo.computeVertexNormals();

    // ================= 3. 精细线条着色器 (Ultra-Fine Line Shader) =================
    const holoMaterial = new THREE.ShaderMaterial({
        uniforms: {
            interval: { value: CONFIG.interval },
            colorLow: { value: new THREE.Color(0x00ffaa) }, // 青色低海拔
            colorMid: { value: new THREE.Color(0xffaa00) }, // 橙色中海拔
            colorHigh: { value: new THREE.Color(0xff5500) },// 红色高海拔
            baseOpacity: { value: 0.1 }, // 极透明基底
            lineThickness: { value: 0.03 } // 【关键】极细线条阈值
        },
        vertexShader: `
            varying float vY; varying vec3 vPos;
            void main() { vY = position.y; vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
        `,
        fragmentShader: `
            uniform float interval; uniform vec3 colorLow; uniform vec3 colorMid; uniform vec3 colorHigh;
            uniform float baseOpacity; uniform float lineThickness;
            varying float vY; varying vec3 vPos;
            void main() {
                // 计算线条: 使用 smoothstep 制作极细发光带
                float linePos = fract(vY / interval);
                // 核心技巧：通过控制 smoothstep 的范围来控制线条锐度
                float line = smoothstep(0.0, lineThickness, linePos) - smoothstep(1.0 - lineThickness, 1.0, linePos);
                line = 1.0 - line; 
                line = pow(line, 3.0); // 锐化边缘

                // 颜色渐变映射 (0-50m)
                float t = clamp(vY / 50.0, 0.0, 1.0);
                vec3 finalColor = mix(colorLow, colorMid, smoothstep(0.0, 0.5, t));
                finalColor = mix(finalColor, colorHigh, smoothstep(0.5, 1.0, t));

                // 合成: 只有线条处发光，基底几乎透明
                float alpha = baseOpacity + line * 0.9;
                gl_FragColor = vec4(finalColor * (1.0 + line * 2.0), alpha);
            }
        `,
        transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const terrainMesh = new THREE.Mesh(geo, holoMaterial);
    terrainGroup.add(terrainMesh);

    // ================= 4. 海拔标注 (Sprite Labels) =================
    const labelGroup = new THREE.Group();
    terrainGroup.add(labelGroup);

    // 创建文字 Sprite 的辅助函数
    function createLabel(text, x, y, z) {
        const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        // 背景框，增加可读性
        ctx.fillStyle = "rgba(0,20,30,0.7)"; ctx.roundRect(10,10,108,44,10); ctx.fill();
        ctx.strokeStyle = "rgba(0,255,255,0.5)"; ctx.lineWidth=2; ctx.stroke();
        // 文字
        ctx.font = "bold 32px monospace"; ctx.fillStyle = "#ffffff"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(text + "m", 64, 32);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas), depthTest: false}));
        sprite.position.set(x, y + 1.5, z); // 稍微浮起
        sprite.scale.set(8, 4, 1);
        sprite.renderOrder = 999; // 永远在最前
        return sprite;
    }

    // 【关键】智能布点：在三座山峰的主要坡面上放置标签
    const samplePoints = [
        {x: 0, z: 15},    // 主峰南坡
        {x: 0, z: -10},   // 主峰北坡
        {x: -35, z: 10},  // 左峰坡
        {x: 30, z: 20}    // 右峰坡
    ];

    samplePoints.forEach(pt => {
        // 沿坡度向上采样
        for(let step = 0; step < 5; step++) {
            // 向山顶方向微调坐标采样
            let sx = pt.x * (1 - step*0.15);
            let sz = pt.z * (1 - step*0.15);
            let h = getElevation(sx, sz);
            // 找到最近的 10m 整数倍高度
            let roundedH = Math.round(h / 10) * 10;
            // 只在 10m, 20m, 30m, 40m 处且高度差不大的地方放置
            if (roundedH > 5 && roundedH <= 40 && Math.abs(h - roundedH) < 2) {
                labelGroup.add(createLabel(roundedH, sx, h, sz));
            }
        }
    });

    // ================= 5. 交互循环 =================
    let targetRotY = 0, targetCamPos = new THREE.Vector3(0, 140, 0);
    function animate() {
        requestAnimationFrame(animate);
        terrainGroup.rotation.y = THREE.MathUtils.lerp(terrainGroup.rotation.y, targetRotY, CONFIG.lerpSpeed);
        camera.position.lerp(targetCamPos, CONFIG.lerpSpeed);
        camera.lookAt(0, 0, 0);
        renderer.render(scene, camera);
    }
    animate();

    // ================= 6. 手势控制 =================
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
    
    const video = document.getElementById('video-input');
    const tracker = document.getElementById('hand-tracker');
    const modeText = document.getElementById('mode-text');
    const rotText = document.getElementById('rot-text');

    hands.onResults(results => {
        document.getElementById('loader').style.display = 'none';
        if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0]; const wrist = lm[0];
            
            // 旋转
            const xVal = 1.0 - wrist.x; 
            targetRotY = (xVal - 0.5) * 3.0;
            rotText.innerText = Math.round(targetRotY * 57.3) + "°";
            tracker.style.display = 'block'; tracker.style.left = (wrist.x*100)+"%"; tracker.style.top = (wrist.y*100)+"%";

            // 模式 & 缩放
            let fDist=0; [8,12,16,20].forEach(i=>fDist+=Math.hypot(lm[i].x-wrist.x, lm[i].y-wrist.y));
            const palm = Math.hypot(lm[9].x-lm[0].x, lm[9].y-lm[0].y);
            const ratio = (fDist/4)/palm;
            let zoom = (palm - 0.15) * 3.5; zoom = THREE.MathUtils.clamp(zoom, -0.4, 0.4);

            if (ratio < 1.0) { // FIST
                modeText.innerText = "3D MOUNTAIN (侧视)"; modeText.style.color = "#ffff00";
                targetCamPos.set(0, 35, 110 * (1-zoom));
                labelGroup.visible = true; // 3D模式显示标签
            } else { // PALM
                modeText.innerText = "2D MAP (俯视)"; modeText.style.color = "#00ffaa";
                targetCamPos.set(0, 150 * (1-zoom), 0);
                labelGroup.visible = false; // 俯视模式隐藏标签，更像地图
            }
        } else { tracker.style.display = 'none'; }
    });

    const cam = new Camera(video, {onFrame:async()=>{await hands.send({image:video});}, width:320, height:240});
    cam.start();
    window.addEventListener('resize', ()=>{camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);});
</script>
</body>

</html>
